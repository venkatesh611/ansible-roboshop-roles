# =========================================================
# GLOBAL VARIABLES FOR ALL HOSTS
# =========================================================
# [all:vars]
#
# Variables defined here apply to ALL servers/groups.
#
# Avoids repetition.
#
# Equivalent to writing same variables
# in every host/group.
# =========================================================
[all:vars]


# SSH username used for connecting servers
#
# ec2-user is default user in Amazon Linux/RHEL AMIs
ansible_user=ec2-user


# SSH password used for authentication
#
# Ansible internally uses SSH connection.
#
# NOTE:
# In real-time production:
# SSH keys are preferred instead of passwords.
ansible_password=DevOps321