# =========================================================
# ANSIBLE INVENTORY FILE
# =========================================================
# Inventory file contains:
#   - Target server details
#   - Group names
#   - Connection variables
#
# Ansible uses inventory to know:
#   - Which servers to connect
#   - Which playbook runs on which servers
#
# Inventory can contain:
#   - Hostnames
#   - IP addresses
#   - Groups
#   - Variables
#
# File Types:
#   - INI format   (this file)
#   - YAML format
#
# =========================================================


# =========================================================
# LOCAL GROUP
# =========================================================
# localhost refers to current machine where
# ansible is installed and executed.
#
# Used for:
#   - AWS resource creation
#   - Route53 automation
#   - Local scripts
# =========================================================
[local]

localhost


# =========================================================
# MONGODB SERVER GROUP
# =========================================================
# Group name:
# mongodb
#
# Host inside group:
# mongodb.venkatapp.fun
#
# Example usage:
#
# hosts: mongodb
#
# Playbook will run on this server.
# =========================================================
[mongodb]

mongodb.venkatapp.fun


# =========================================================
# REDIS SERVER GROUP
# =========================================================
# Redis used for:
#   caching
#   session storage
#   temporary fast storage
# =========================================================
[redis]

redis.venkatapp.fun


# =========================================================
# MYSQL SERVER GROUP
# =========================================================
# MySQL used as relational database.
# =========================================================
[mysql]

mysql.venkatapp.fun


