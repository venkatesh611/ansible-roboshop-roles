- name: app setup
  ansible.builtin.import_role:
   name: common
   tasks_from: app-setup.yaml

- name: node setup
  ansible.builtin.import_role:
     name: common
     tasks_from: nodejs.yaml

- name: copy mongo.repo
  ansible.builtin.copy:
   src: mongo.repo
   dest: /etc/yum.repos.d/mongo.repo

- name: install mongosh client
  ansible.builtin.package:
   name: mongodb-mongosh
   state: present
- name: Check catalogue DB existence
  ansible.builtin.command: mongosh mongodb.venkatapp.fun --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
  register: catalogue_output

- name: Load products into MongoDB
  ansible.builtin.shell: mongosh --host mongodb.venkatapp.fun </app/db/master-data.js
  when: catalogue_output.stdout | int < 0

- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd.yaml